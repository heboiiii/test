<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Frame — Posts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .post-grid {
      display: grid;
      gap: 1px;
      background: var(--surface-line);
      border: 1px solid var(--surface-line);
      margin-top: 8px;
    }
    .post-card {
      background: var(--bg);
      padding: 28px 24px;
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 24px;
      align-items: start;
      transition: background 0.2s ease;
    }
    .post-card:hover {
      background: var(--surface);
    }
    .post-date {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .post-card h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin: 0 0 8px;
    }
    .post-card p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .empty-note {
      margin-top: 32px;
      padding: 20px;
      border: 1px dashed var(--surface-line);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .post-card.has-image {
      grid-template-columns: 90px 100px 1fr;
    }
    .post-thumb {
      width: 100px;
      height: 70px;
      object-fit: cover;
      border-radius: var(--radius);
      background: var(--surface-line);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="shell">
      <a href="index.html" class="brand">The Daily Frame<span class="dot">.</span></a>
      <nav class="main-nav" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="posts.html" aria-current="page">Posts</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header shell">
      <p class="eyebrow">00:01 — Posts</p>
      <h1>Every entry, newest first.</h1>
    </section>

    <section class="page-body shell" style="max-width: 100%;">
      <div class="post-grid" id="post-grid">
        <p class="empty-note">Loading posts…</p>
      </div>
    </section>
  </main>

  <!-- Supabase client library, loaded from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // 1. Paste your own values here — find them in Supabase under
    //    Project Settings -> Data API
    const SUPABASE_URL = "https://ggismdwuzvlsuhzhpzzw.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ghSoODPO6E9xHz5TOVCC6Q_xCI_4uVD";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadPosts() {
      const grid = document.getElementById("post-grid");

      const { data: posts, error } = await supabase
        .from("PLAVE")            // <- your table name
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = `<p class="empty-note">Couldn't load posts: ${error.message}</p>`;
        return;
      }

      if (!posts || posts.length === 0) {
        grid.innerHTML = `<p class="empty-note">No posts yet — add one in Supabase and refresh.</p>`;
        return;
      }

      grid.innerHTML = posts.map(post => {
        const date = new Date(post.created_at).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric"
        }).toUpperCase();

        const thumb = post.image_url
          ? `<img class="post-thumb" src="${post.image_url}" alt="${post.Title || post.title || ""}">`
          : "";

        const title = post.Title || post.title || "Untitled";
        const description = post.Description || post.description || "";

        return `
          <article class="post-card ${post.image_url ? "has-image" : ""}">
            <span class="post-date">${date}</span>
            ${thumb}
            <span>
              <h3>${title}</h3>
              <p>${description}</p>
            </span>
          </article>
        `;
      }).join("");
    }

    loadPosts();
  </script>

  <footer class="site-footer">
    <div class="shell">
      <span>© 2026 The Daily Frame</span>
      <span>Built with HTML, CSS &amp; a little JS</span>
    </div>
  </footer>

</body>
</html>
